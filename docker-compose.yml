services:
  postgres:
    image: postgres:16-alpine
    container_name: stockdivs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockdivs
      POSTGRES_USER: stockdivs
      POSTGRES_PASSWORD: stockdivs
    ports:
      - "54320:5432"
    volumes:
      - stockdivs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockdivs -d stockdivs"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockdivs-redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    volumes:
      - stockdivs-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stockdivs-postgres-data:
  stockdivs-redis-data:
